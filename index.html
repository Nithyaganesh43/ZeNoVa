<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Command Display</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
        }

        #cmd {
            font-size: 2rem;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div id="cmd"></div>
    <script>
        let ws = new WebSocket("wss://zenova-server.onrender.com");
        ws.onmessage = e => document.getElementById("cmd").textContent = e.data;
    </script>
</body>

</html>
